{% extends "base.html" %}
{% block title %}Recommendation History - Galaxy Compass{% endblock %}

{% block content %}
<section class="gm-results-hero">
  <div class="gm-container">
    <a href="{{ url_for('home') }}" class="gm-back-link"><i class="bi bi-arrow-left"></i> Home</a>
    <h1 class="gm-results-title">Recommendation History</h1>
    <p class="gm-results-sub">Review previous recommendation runs saved on this device.</p>
  </div>
</section>

<section class="gm-section">
  <div class="gm-container">
    <div class="gm-history-actions">
      <button class="btn gm-btn-outline gm-history-clear-btn" id="gm-history-clear" type="button">
        <i class="bi bi-trash3"></i> Clear history
      </button>
    </div>

    <div id="gm-history-content"></div>
    <div id="gm-history-detail" class="gm-history-detail"></div>
  </div>
</section>
{% endblock %}

{% block extra_scripts %}
<script src="{{ url_for('static', filename='js/history.js') }}"></script>
{% endblock %}
